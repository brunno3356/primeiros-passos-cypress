name: CI

on:
  push:
  workflow_dispatch:

jobs:
  cypress-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          build: false   # 👈 não tenta rodar npm run build
          command: npx cypress run  # 👈 executa os testes direto

      - name: Upload Cypress Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Cypress Results
          path: |
            cypress/screenshots
            cypress/videos
            cypress/results
          if-no-files-found: ignore
